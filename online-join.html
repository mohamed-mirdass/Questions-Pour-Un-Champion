<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Arena - Rejoindre une partie</title>
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" href="data:,">
<style>
  .join-wrap{width:min(420px,100%);text-align:center;margin:0 auto}
  .join-wrap .inp{margin:8px 0;text-align:center}
  #join-code{text-transform:uppercase;letter-spacing:4px}
  #join-error{color:var(--danger);margin-top:10px;min-height:20px;font-weight:800;font-size:13px}

  #waiting-msg{display:none;margin-top:20px;color:var(--text-dim)}

  #play-screen{display:none;text-align:center}
  #q-context{color:var(--text-dim);font-size:12px;font-weight:800;margin-bottom:6px}
  #q-text{font-size:18px;font-weight:800;margin:10px 0 16px;line-height:1.4}
  #turn-msg{font-size:15px;font-weight:800;min-height:22px;margin-bottom:10px}

  #buzz-btn{
    width:180px;height:180px;border-radius:50%;border:0;color:#fff;
    background:radial-gradient(circle at 35% 25%,#ff9cae,#ff3156 48%,#7a0e24);
    box-shadow:0 0 0 10px rgba(255,84,112,.08),0 24px 58px rgba(255,84,112,.36);
    font-family:ui-sans-serif,system-ui,sans-serif;font-weight:900;font-size:24px;
    letter-spacing:.08em;cursor:pointer;animation:buzzPulse 2.4s infinite;margin:10px auto;
  }
  #buzz-btn:disabled{animation:none;background:var(--surface);box-shadow:none;color:var(--muted);cursor:not-allowed}
  @keyframes buzzPulse{50%{transform:translateY(-7px)}}

  .choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .choice-btn{padding:16px 10px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--card-border);color:var(--text);font-weight:800;font-size:14px;cursor:pointer}
  .choice-btn:disabled{opacity:.5;cursor:not-allowed}
  .choice-btn.correct{background:rgba(46,213,115,.18);border-color:#2ed573}
  .choice-btn.wrong{background:rgba(255,71,87,.18);border-color:#ff4757}

  #buzz-status{margin-top:14px;font-size:14px;font-weight:800;min-height:20px}
</style>
</head>
<body class="page-online">
<div id="particles" aria-hidden="true"></div>
<nav class="site-nav" aria-label="Navigation principale">
  <a class="nav-link" href="index.html" data-nav>Accueil</a>
  <a class="nav-link" href="game.html" data-nav>Partie</a>
  <a class="nav-link" href="tournament.html" data-nav>Tournoi</a>
  <a class="nav-link" href="mission.html" data-nav>Mission</a>
  <a class="nav-link" href="online.html" data-nav>En ligne</a>
  <a class="nav-link" href="rules.html" data-nav>Règles</a>
  <a class="nav-link" href="history.html" data-nav>Historique</a>
</nav>
<main id="appRoot">
  <div class="screen active">
    <div class="card join-wrap fade-in">
      <div class="eyebrow">Partie en ligne</div>
      <h2 style="font-family:ui-sans-serif,system-ui,sans-serif;font-size:28px;margin:6px 0 18px">Rejoindre la partie</h2>

      <form id="join-form">
        <input id="join-code" class="inp" placeholder="Code de la salle" maxlength="6" required autocomplete="off">
        <input id="join-name" class="inp" placeholder="Ton nom" maxlength="20" required autocomplete="off">
        <button type="submit" class="btn btn-primary btn-start">Rejoindre</button>
      </form>
      <p id="join-error"></p>
      <p id="waiting-msg">✅ Tu es dans la salle ! En attente du lancement par l'hote...</p>

      <div id="play-screen">
        <div id="q-context"></div>
        <div id="q-text"></div>
        <div id="turn-msg"></div>
        <button id="buzz-btn">BUZZ</button>
        <div class="choices-grid" id="choices-grid" style="display:none;"></div>
        <p id="buzz-status"></p>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { joinRoom, subscribeToRoom, getPlayers, buzz, submitAnswer } from './assets/js/online/room.js';

  const form = document.getElementById('join-form');
  const codeInput = document.getElementById('join-code');
  const nameInput = document.getElementById('join-name');
  const errorEl = document.getElementById('join-error');
  const waitingMsg = document.getElementById('waiting-msg');
  const playScreen = document.getElementById('play-screen');
  const qContext = document.getElementById('q-context');
  const qText = document.getElementById('q-text');
  const turnMsg = document.getElementById('turn-msg');
  const buzzBtn = document.getElementById('buzz-btn');
  const choicesGrid = document.getElementById('choices-grid');
  const buzzStatus = document.getElementById('buzz-status');

  let currentRoom = null;
  let currentPlayer = null;
  let myIndex = -1;
  let hasStarted = false;
  let lastQIndex = null;
  let hasAnsweredThisQuestion = false;

  const params = new URLSearchParams(location.search);
  if (params.get('code')) codeInput.value = params.get('code');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    const submitBtn = form.querySelector('button');
    submitBtn.disabled = true;

    try {
      const { room, player } = await joinRoom(codeInput.value, nameInput.value);
      currentRoom = room;
      currentPlayer = player;

      const allPlayers = await getPlayers(room.id);
      myIndex = allPlayers.findIndex((p) => p.id === player.id);

      form.style.display = 'none';

      if (room.status === 'playing') {
        hasStarted = true;
        showPlayScreen();
        render(room.live_state || {});
      } else {
        waitingMsg.style.display = 'block';
      }

      subscribeToRoom(room.id, {
        onRoomChange: (payload) => {
          const updated = payload.new;
          if (updated.status === 'playing' && !hasStarted) {
            hasStarted = true;
            waitingMsg.style.display = 'none';
            showPlayScreen();
          }
          if (hasStarted) {
            render(updated.live_state || {});
          }
        },
      });
    } catch (err) {
      errorEl.textContent = err.message;
      submitBtn.disabled = false;
    }
  });

  function showPlayScreen() {
    waitingMsg.style.display = 'none';
    playScreen.style.display = 'block';
  }

  function render(state) {
    if (state.qIndex !== lastQIndex) {
      lastQIndex = state.qIndex;
      hasAnsweredThisQuestion = false;
      buzzStatus.textContent = '';
    }

    if (!state.screen || state.screen !== 'gameScreen') {
      qContext.textContent = '';
      qText.textContent = "En attente que l'hote configure la partie...";
      turnMsg.textContent = '';
      buzzBtn.style.display = 'none';
      choicesGrid.style.display = 'none';
      return;
    }

    qContext.textContent = `${state.qCounter || ''}  ${state.diffLabel || ''}`;
    qText.textContent = state.questionText || '...';

    const iAmActive = state.activePlayerIdx === myIndex;
    const someoneActive = state.activePlayerIdx !== null && state.activePlayerIdx !== undefined;

    if (state.revealed) {
      // Question terminee : afficher le resultat, cacher buzz + choix actifs
      buzzBtn.style.display = 'none';
      turnMsg.textContent = iAmActive ? 'Reponse envoyee !' : '';
      renderChoices(state, true);
      return;
    }

    if (!someoneActive) {
      // Personne n'a buzze : bouton BUZZ actif
      buzzBtn.style.display = 'inline-block';
      buzzBtn.disabled = false;
      turnMsg.textContent = 'Appuie des que tu connais la reponse !';
      choicesGrid.style.display = 'none';
      choicesGrid.innerHTML = '';
    } else if (iAmActive) {
      // C'est mon tour : choix de reponse
      buzzBtn.style.display = 'none';
      turnMsg.textContent = 'A toi de repondre !';
      renderChoices(state, false);
    } else {
      // Quelqu'un d'autre a buzze
      buzzBtn.style.display = 'none';
      turnMsg.textContent = 'Un autre joueur a buzze en premier...';
      choicesGrid.style.display = 'none';
      choicesGrid.innerHTML = '';
    }
  }

  function renderChoices(state, revealedMode) {
    if (!state.choices || state.choices.length === 0) {
      choicesGrid.style.display = 'none';
      return;
    }
    choicesGrid.style.display = 'grid';
    choicesGrid.innerHTML = state.choices.map((c) => {
      let cls = 'choice-btn';
      if (revealedMode && state.correctText === c.text) cls += ' correct';
      const disabled = revealedMode || hasAnsweredThisQuestion;
      return `<button class="${cls}" data-val="${escapeHtml(c.text)}" ${disabled ? 'disabled' : ''}>${escapeHtml(c.letter)}. ${escapeHtml(c.text)}</button>`;
    }).join('');

    if (!revealedMode) {
      choicesGrid.querySelectorAll('.choice-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (hasAnsweredThisQuestion) return;
          hasAnsweredThisQuestion = true;
          choicesGrid.querySelectorAll('.choice-btn').forEach((b) => (b.disabled = true));
          buzzStatus.textContent = 'Reponse envoyee...';
          try {
            await submitAnswer(currentRoom.id, currentPlayer.id, lastQIndex ?? 0, btn.dataset.val);
          } catch (err) {
            buzzStatus.textContent = '⚠️ ' + err.message;
          }
        });
      });
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  buzzBtn.addEventListener('click', async () => {
    buzzBtn.disabled = true;
    buzzStatus.textContent = 'Buzz envoye...';
    try {
      await buzz(currentRoom.id, currentPlayer.id, lastQIndex ?? 0);
    } catch (err) {
      buzzStatus.textContent = '⚠️ ' + err.message;
      buzzBtn.disabled = false;
    }
  });
</script>
</body>
</html>
