<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Arena - Boutique</title>
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" href="data:,">
<style>
  .shop-wrap{width:min(1080px,100%);margin:0 auto}
  .shop-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:22px}
  .shop-header .eyebrow{font-size:20px}
  .shop-coins{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:900;color:var(--gold);padding:10px 18px;border-radius:999px;background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.28)}

  .level-box{
    display:flex;align-items:center;gap:18px;margin-bottom:26px;padding:20px;
    border-radius:16px;
    background:linear-gradient(135deg,rgba(124,92,255,.14),rgba(64,224,208,.08));
    border:1px solid rgba(124,92,255,.32);
    box-shadow:0 18px 44px rgba(124,92,255,.14);
  }
  .level-badge{
    width:64px;height:64px;border-radius:50%;display:grid;place-items:center;
    font-weight:900;font-size:22px;color:#fff;flex:0 0 auto;
    background:conic-gradient(from 220deg,var(--purple),var(--accent),var(--purple));
    box-shadow:0 0 0 4px rgba(124,92,255,.18),0 10px 26px rgba(124,92,255,.35);
  }
  .level-info{flex:1}
  .level-info > div:first-child{font-size:15px;letter-spacing:.02em}
  .level-bar-bg{height:10px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:8px;box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
  .level-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--purple));box-shadow:0 0 12px rgba(64,224,208,.5);transition:width .5s ease}

  .masters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px}

  .master-card{
    padding:16px;text-align:center;position:relative;overflow:hidden;
    border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01));
    border:1px solid var(--card-border);
    transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;
  }
  .master-card:hover{transform:translateY(-6px);box-shadow:0 26px 54px rgba(0,0,0,.35);border-color:rgba(124,92,255,.4)}
  .master-card img{
    width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;margin-bottom:12px;
    display:block;transition:transform .4s ease;
    box-shadow:0 10px 26px rgba(0,0,0,.3);
  }
  .master-card:hover img{transform:scale(1.04)}
  .master-name{font-weight:900;font-size:17px;font-family:ui-sans-serif,system-ui,sans-serif}
  .master-title{color:var(--text-dim);font-size:12px;margin:2px 0 12px;font-style:italic}
  .master-price{
    display:inline-flex;align-items:center;gap:5px;font-weight:900;color:var(--gold);
    margin-bottom:12px;padding:4px 12px;border-radius:999px;
    background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);font-size:13px;
  }

  .locked-overlay{
    position:absolute;inset:0;background:rgba(9,11,16,.88);backdrop-filter:blur(2px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    font-weight:800;font-size:13px;text-align:center;padding:10px;
    border-radius:18px;
  }
  .locked-overlay > div:first-child{font-size:26px}
  .active-badge{
    position:absolute;top:12px;right:12px;z-index:2;
    background:var(--success);color:#06200f;font-size:10px;font-weight:900;
    padding:5px 10px;border-radius:999px;letter-spacing:.06em;
    box-shadow:0 6px 16px rgba(74,222,128,.4);
  }
  .not-logged{text-align:center;padding:40px}
</style>
</head>
<body class="page-online">
<div id="particles" aria-hidden="true"></div>
<nav class="site-nav" aria-label="Navigation principale">
  <a class="nav-link" href="index.html" data-nav>Accueil</a>
  <a class="nav-link" href="game.html" data-nav>Partie</a>
  <a class="nav-link" href="tournament.html" data-nav>Tournoi</a>
  <a class="nav-link" href="mission.html" data-nav>Mission</a>
  <a class="nav-link" href="classement.html" data-nav>Classement</a>
  <a class="nav-link" href="online.html" data-nav>En ligne</a>
  <a class="nav-link" href="boutique.html" data-nav>Boutique</a>
  <a class="nav-link" href="login.html" data-nav>Mon compte</a>
  <a class="nav-link" href="rules.html" data-nav>Règles</a>
</nav>
<main id="appRoot">
  <div class="screen active">
    <div class="shop-wrap fade-in">

      <div id="not-logged" class="card not-logged" style="display:none;">
        <div class="eyebrow">Boutique</div>
        <h2 style="font-family:ui-sans-serif,system-ui,sans-serif;font-size:26px;margin:10px 0">Connecte-toi pour acceder a la boutique</h2>
        <a class="btn btn-primary" href="login.html">Se connecter</a>
      </div>

      <div id="shop-content" style="display:none;">
        <div class="shop-header">
          <div class="eyebrow" style="font-size:18px">🛍️ Boutique</div>
          <div class="shop-coins" id="shop-coins">0 coins</div>
        </div>

        <div class="card level-box">
          <div class="level-badge" id="level-badge">1</div>
          <div class="level-info">
            <div style="font-weight:800">Niveau <span id="level-num">1</span> / 50</div>
            <div class="level-bar-bg"><div class="level-bar" id="level-bar" style="width:0%"></div></div>
            <div style="color:var(--text-dim);font-size:12px;margin-top:4px" id="level-detail"></div>
          </div>
        </div>

        <div id="locked-msg" class="card" style="display:none;text-align:center;margin-bottom:20px;color:var(--text-dim);">
          🔒 Atteins le niveau 7 pour acheter des Quiz Masters (encore <span id="levels-left"></span> niveaux)
        </div>

        <div class="masters-grid" id="masters-grid"></div>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { supabase } from './assets/js/online/supabaseClient.js';

  const MASTERS = [
    { id: 'default', name: 'Classique', title: 'Le presentateur original', price: 0, img: 'assets/img/quizmaster.png' },
    { id: 'marcus', name: 'Marcus', title: 'Le genie', price: 5000, img: 'assets/img/quizmasters/marcus.png' },
    { id: 'sofia', name: 'Sofia', title: "L'exploratrice", price: 3500, img: 'assets/img/quizmasters/sofia.png' },
    { id: 'leonard', name: 'Leonard', title: 'Le sage', price: 2500, img: 'assets/img/quizmasters/leonard.png' },
    { id: 'max', name: 'Max', title: 'Le malin', price: 2000, img: 'assets/img/quizmasters/max.png' },
    { id: 'elhajoui', name: 'El Hajoui', title: 'Le veteran', price: 6000, img: 'assets/img/quizmasters/elhajoui.png' },
    { id: 'ilyass', name: 'Ilyass', title: 'Le pro', price: 4500, img: 'assets/img/quizmasters/ilyass.png' },
    { id: 'ouahbi', name: 'Ouahbi', title: 'Le flambeur', price: 5500, img: 'assets/img/quizmasters/ouahbi.png' },
    { id: 'walid', name: 'Walid', title: 'Le charmeur', price: 3000, img: 'assets/img/quizmasters/walid.png' },
  ];

  const UNLOCK_LEVEL = 7;

  const notLogged = document.getElementById('not-logged');
  const shopContent = document.getElementById('shop-content');
  const shopCoins = document.getElementById('shop-coins');
  const levelBadge = document.getElementById('level-badge');
  const levelNum = document.getElementById('level-num');
  const levelBar = document.getElementById('level-bar');
  const levelDetail = document.getElementById('level-detail');
  const lockedMsg = document.getElementById('locked-msg');
  const levelsLeft = document.getElementById('levels-left');
  const mastersGrid = document.getElementById('masters-grid');

  let currentUserId = null;
  let currentProfile = null;

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      notLogged.style.display = 'block';
      return;
    }
    currentUserId = session.user.id;

    const { data: profile, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', currentUserId)
      .single();

    if (error || !profile) {
      notLogged.style.display = 'block';
      return;
    }

    currentProfile = profile;
    shopContent.style.display = 'block';
    render();
  }

  function levelFromXp(xp) {
    return Math.min(50, Math.floor(xp / 100) + 1);
  }

  function render() {
    const xp = currentProfile.xp || 0;
    const level = levelFromXp(xp);
    const xpInLevel = xp % 100;
    const unlocked = level >= UNLOCK_LEVEL;

    shopCoins.textContent = `${currentProfile.coins || 0} coins`;
    levelBadge.textContent = level;
    levelNum.textContent = level;
    levelBar.style.width = `${xpInLevel}%`;
    levelDetail.textContent = `${xpInLevel} / 100 XP vers le niveau ${Math.min(50, level + 1)}`;

    if (!unlocked) {
      lockedMsg.style.display = 'block';
      levelsLeft.textContent = UNLOCK_LEVEL - level;
    } else {
      lockedMsg.style.display = 'none';
    }

    const owned = currentProfile.owned_masters || ['default'];
    const active = currentProfile.active_master || 'default';

    mastersGrid.innerHTML = MASTERS.map((m) => {
      const isOwned = owned.includes(m.id);
      const isActive = active === m.id;
      let actionHtml;
      if (isActive) {
        actionHtml = `<button class="btn" disabled style="width:100%">Equipe</button>`;
      } else if (isOwned) {
        actionHtml = `<button class="btn btn-primary" data-action="equip" data-id="${m.id}" style="width:100%">Equiper</button>`;
      } else if (!unlocked) {
        actionHtml = `<button class="btn" disabled style="width:100%">Verrouille</button>`;
      } else {
        actionHtml = `<button class="btn btn-primary" data-action="buy" data-id="${m.id}" style="width:100%">Acheter</button>`;
      }

      return `
        <div class="card master-card">
          ${isActive ? '<div class="active-badge">EQUIPE</div>' : ''}
          ${!unlocked && !isOwned ? '<div class="locked-overlay">🔒<div>Niveau ' + UNLOCK_LEVEL + ' requis</div></div>' : ''}
          <img src="${m.img}" alt="${m.name}">
          <div class="master-name">${m.name}</div>
          <div class="master-title">${m.title}</div>
          <div class="master-price">${m.price === 0 ? 'Gratuit' : m.price + ' coins'}</div>
          ${actionHtml}
        </div>
      `;
    }).join('');

    mastersGrid.querySelectorAll('button[data-action]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === 'buy') buyMaster(id);
        if (action === 'equip') equipMaster(id);
      });
    });
  }

  async function buyMaster(id) {
    const master = MASTERS.find((m) => m.id === id);
    if (!master) return;
    const coins = currentProfile.coins || 0;
    if (coins < master.price) {
      alert("Pas assez de coins pour acheter ce Quiz Master.");
      return;
    }
    const newOwned = [...(currentProfile.owned_masters || ['default']), id];
    const newCoins = coins - master.price;

    try {
      const { error } = await supabase
        .from('profiles')
        .update({ owned_masters: newOwned, coins: newCoins, active_master: id })
        .eq('id', currentUserId);
      if (error) throw error;

      currentProfile.owned_masters = newOwned;
      currentProfile.coins = newCoins;
      currentProfile.active_master = id;
      localStorage.setItem('qpuc_coins', JSON.stringify({ coins: newCoins, lastReset: Date.now() }));
      render();
    } catch (err) {
      alert("Erreur lors de l'achat : " + err.message);
    }
  }

  async function equipMaster(id) {
    try {
      const { error } = await supabase
        .from('profiles')
        .update({ active_master: id })
        .eq('id', currentUserId);
      if (error) throw error;
      currentProfile.active_master = id;
      render();
    } catch (err) {
      alert("Erreur : " + err.message);
    }
  }

  init();
</script>
</body>
</html>
