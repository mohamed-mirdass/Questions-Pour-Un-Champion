<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Quiz Arena is a premium multiplayer quiz platform with local and online play, creator tools, rankings, and Supabase-powered persistence."
    />
    <title>Quiz Arena</title>
    <link rel="icon" href="/assets/img/quizmaster.png" />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #08111f;
        color: #eef5ff;
      }

      .boot-message {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(70, 215, 255, 0.2), transparent 25%),
          radial-gradient(circle at top right, rgba(141, 91, 255, 0.22), transparent 22%),
          linear-gradient(135deg, #060816, #0e1530);
      }

      .boot-card {
        max-width: 680px;
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(162, 186, 255, 0.18);
        background: rgba(10, 16, 36, 0.82);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      }

      .boot-card h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      .boot-card p {
        margin: 0 0 10px;
        line-height: 1.6;
        color: rgba(239, 245, 255, 0.78);
      }

      .boot-card code {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <div class="boot-card">
          <h1>Quiz Arena needs the Vite dev server</h1>
          <p>This project is no longer a plain HTML site, so opening it with VS Code Live Server on port 5500 will show a blank page.</p>
          <p>Run the app with Vite instead, then open the URL it gives you.</p>
          <code>npm install</code><br />
          <code>npm run dev</code>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
