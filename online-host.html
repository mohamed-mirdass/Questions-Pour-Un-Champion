<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Arena - Salle en ligne (Host)</title>
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" href="data:,">
<style>
  .host-wrap{width:min(560px,100%);text-align:center;margin:0 auto}
  .room-code{font-family:ui-sans-serif,system-ui,sans-serif;font-size:56px;font-weight:900;letter-spacing:10px;color:var(--accent);margin:14px 0}
  .qr-box{display:flex;justify-content:center;margin:18px 0}
  .qr-box img{width:220px;height:220px;background:#fff;padding:10px;border-radius:var(--radius)}
  .slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
  .slot{padding:14px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--card-border);text-align:left;transition:.2s}
  .slot.filled{border-color:var(--accent);background:rgba(64,224,208,.08)}
  .slot.robot{opacity:.55;border-style:dashed}
  .slot-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .slot-name{font-weight:800;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #status-msg{color:var(--text-dim);margin-top:14px}
  .hint{color:var(--text-dim);font-size:12px;margin-top:10px}
</style>
</head>
<body class="page-online">
<div id="particles" aria-hidden="true"></div>
<nav class="site-nav" aria-label="Navigation principale">
  <a class="nav-link" href="index.html" data-nav>Accueil</a>
  <a class="nav-link" href="game.html" data-nav>Partie</a>
  <a class="nav-link" href="tournament.html" data-nav>Tournoi</a>
  <a class="nav-link" href="mission.html" data-nav>Mission</a>
  <a class="nav-link" href="classement.html" data-nav>Classement</a>
  <a class="nav-link" href="online.html" data-nav>En ligne</a>
  <a class="nav-link" href="rules.html" data-nav>Règles</a>
  <a class="nav-link" href="history.html" data-nav>Historique</a>
</nav>
<main id="appRoot">
  <div class="screen active">
    <div class="card host-wrap fade-in">
      <div class="eyebrow">Partie en ligne</div>
      <p id="status-msg">Creation de la salle...</p>

      <div id="room-info" style="display:none;">
        <div class="room-code" id="room-code">----</div>
        <div class="qr-box"><img id="qr-img" alt="QR code pour rejoindre"></div>
        <p style="color:var(--text-dim);font-size:13px">Scanne le QR code ou va sur <code>online-join.html</code></p>

        <div class="label">Joueurs</div>
        <div class="slots-grid" id="slots-grid"></div>

        <button class="btn btn-primary btn-start" id="start-btn" disabled>Lancer la partie</button>
        <p class="hint">Tu seras redirige vers le plateau de jeu normal, avec les noms deja remplis.</p>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { createRoom, subscribeToRoom, getPlayers, startGame } from './assets/js/online/room.js';

  const statusMsg = document.getElementById('status-msg');
  const roomInfo = document.getElementById('room-info');
  const roomCodeEl = document.getElementById('room-code');
  const qrImg = document.getElementById('qr-img');
  const slotsGrid = document.getElementById('slots-grid');
  const startBtn = document.getElementById('start-btn');

  const MAX_SLOTS = 4;
  let players = [];
  let currentRoom = null;

  function renderSlots(list) {
    players = list;
    let html = '';
    for (let i = 0; i < MAX_SLOTS; i++) {
      const p = players[i];
      if (p) {
        html += `<div class="slot filled"><div class="slot-label">Joueur ${i + 1}</div><div class="slot-name">${escapeHtml(p.name)}</div></div>`;
      } else {
        html += `<div class="slot robot"><div class="slot-label">Joueur ${i + 1}</div><div class="slot-name">Robot ${i + 1}</div></div>`;
      }
    }
    slotsGrid.innerHTML = html;
    startBtn.disabled = players.length === 0;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  (async () => {
    try {
      const { room } = await createRoom();
      currentRoom = room;

      roomCodeEl.textContent = room.code;
      const joinUrl = `${location.origin}${location.pathname.replace('online-host.html', 'online-join.html')}?code=${room.code}`;
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(joinUrl)}`;

      statusMsg.style.display = 'none';
      roomInfo.style.display = 'block';

      renderSlots(await getPlayers(room.id));

      subscribeToRoom(room.id, {
        onPlayersChange: async () => renderSlots(await getPlayers(room.id)),
      });
    } catch (err) {
      statusMsg.textContent = '⚠️ ' + err.message;
    }
  })();

  startBtn.addEventListener('click', async () => {
    try {
      startBtn.disabled = true;
      await startGame(currentRoom.id);
      location.href = `index.html?room=${currentRoom.code}`;
    } catch (err) {
      alert(err.message);
      startBtn.disabled = false;
    }
  });
</script>
</body>
</html>
