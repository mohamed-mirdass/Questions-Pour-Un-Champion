<body class="page-history">

  <button class="topbar-btn" id="themeToggle" onclick="toggleTheme()" type="button"><span>Mode</span></button>

<nav class="site-nav" aria-label="Navigation principale">

</nav>

  <section class="history-content fade-in">
    <div class="eyebrow">Archives locales</div>
    <h2>Historique des parties</h2>
    <div id="historyList"></div>
    <a class="btn btn-ghost full-btn" href="index.html">Retour accueil</a>
